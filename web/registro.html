<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrarse - CoffeeBreak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="loaderGlobal" class="loader-container">
        <div class="loader"></div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <div class="auth-page">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-cup-hot-fill"></i>CoffeeBreak</div>
            <div class="auth-sub">Crea tu cuenta para empezar</div>
        </div>

        <div class="auth-body">
            <form id="registroForm" novalidate>
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" required placeholder="Tu apellido">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Opcional">
                </div>
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" required minlength="8" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="contrasenaConfirmar">Confirmar Contraseña</label>
                    <input type="password" id="contrasenaConfirmar" required placeholder="Repite la contraseña">
                </div>
                <button type="submit" class="btn-primary-custom">Crear Cuenta</button>
            </form>
        </div>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            const confirmar = document.getElementById('contrasenaConfirmar').value;

            if (Validaciones.esCampoVacio(nombre) || Validaciones.esCampoVacio(apellido) || Validaciones.esCampoVacio(email) || Validaciones.esCampoVacio(contrasena)) {
                Toast.mostrar('Todos los campos obligatorios deben estar llenos', 'danger');
                return;
            }
            if (!Validaciones.esEmailValido(email)) {
                Toast.mostrar('Email no válido', 'danger');
                return;
            }
            if (!Validaciones.esContrasenaValida(contrasena)) {
                Toast.mostrar('La contraseña debe tener al menos 8 caracteres', 'danger');
                return;
            }
            if (contrasena !== confirmar) {
                Toast.mostrar('Las contraseñas no coinciden', 'danger');
                return;
            }
            mostrarLoader();
            try {
                await API.post(API.getBaseUrl() + '/api/registro', { nombre, apellido, email, contrasena, telefono });
                Toast.mostrar('Registro exitoso. Ahora puedes iniciar sesión.', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 1200);
            } catch (error) {
                Toast.mostrar(error.message, 'danger');
            } finally {
                ocultarLoader();
            }
        });
    </script>
</body>
</html>
