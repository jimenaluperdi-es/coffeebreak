<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú - CoffeeBreak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="loaderGlobal" class="loader-container">
        <div class="loader"></div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <!-- DESKTOP NAV -->
    <nav class="desktop-nav">
        <div class="dnav-inner">
            <div class="dnav-left">
                <div class="dnav-links">
                    <a href="menu.html" class="active">Menú</a>
                    <a href="carrito.html">Carrito</a>
                    <a href="historial.html">Mis Pedidos</a>
                </div>
            </div>
            <a href="index.html" class="dnav-center dnav-brand"><i class="bi bi-cup-hot-fill"></i>CoffeeBreak</a>
            <div class="dnav-right">
                <div class="dnav-guest">
                    <a href="login.html">Iniciar Sesión</a>
                    <a href="registro.html" class="dnav-btn">Registrarse</a>
                </div>
                <div class="dnav-user">
                    <span class="dnav-user-name"><i class="bi bi-person-fill"></i><span id="dnavUserName">Usuario</span></span>
                    <a href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- DRAWER OVERLAY -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="cerrarDrawer()"></div>

    <!-- DRAWER -->
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="brand"><i class="bi bi-cup-hot-fill"></i> CoffeeBreak</div>
        </div>
        <div class="drawer-user nav-user" style="display:none;">
            <div class="avatar" id="drawerAvatar">U</div>
            <div>
                <div class="user-name" id="drawerUserName">Usuario</div>
                <div class="user-email" id="drawerUserEmail">usuario@email.com</div>
            </div>
        </div>
        <div class="drawer-nav">
            <a href="index.html"><i class="bi bi-house-fill"></i>Inicio</a>
            <a href="menu.html" class="active"><i class="bi bi-menu-app-fill"></i>Menú</a>
            <a href="carrito.html"><i class="bi bi-cart-fill"></i>Carrito</a>
            <a href="historial.html"><i class="bi bi-clock-fill"></i>Mis Pedidos</a>
            <a href="login.html" class="nav-guest"><i class="bi bi-box-arrow-in-right"></i>Iniciar Sesión</a>
            <a href="registro.html" class="nav-guest"><i class="bi bi-person-plus-fill"></i>Registrarse</a>
            <a href="#" class="nav-user" style="display:none;" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i>Cerrar Sesión</a>
        </div>
        <div class="drawer-footer">
            <small style="color:var(--texto-claro);">CoffeeBreak v1.0</small>
        </div>
    </div>

    <!-- APP BAR -->
    <div class="app-bar">
        <button class="btn-icon" onclick="abrirDrawer()"><i class="bi bi-list"></i></button>
        <a href="index.html" class="brand"><i class="bi bi-cup-hot-fill"></i>CoffeeBreak</a>
        <div class="app-bar-right">
            <a href="carrito.html" class="btn-icon">
                <i class="bi bi-cart-fill"></i>
                <span class="carrito-badge-mobile" id="cartBadgeMobile">0</span>
            </a>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-bar">
        <div class="input-group">
            <i class="bi bi-search"></i>
            <input type="text" id="busquedaInput" placeholder="Buscar en el menú...">
        </div>
    </div>

    <!-- CATEGORY PILLS -->
    <div class="category-pills" id="categoriasContainer">
        <button class="pill active" onclick="filtrarPorCategoria('todas', this)">Todas</button>
    </div>

    <!-- PRODUCT GRID -->
    <div class="product-grid" id="productosContainer">
        <div style="grid-column:1/-1; text-align:center; padding:2rem;">
            <div class="loader"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
