<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión - CoffeeBreak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div id="loaderGlobal" class="loader-container">
        <div class="loader"></div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <div class="auth-page">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-cup-hot-fill"></i>CoffeeBreak</div>
            <div class="auth-sub">Inicia sesión para pedir</div>
        </div>

        <div class="auth-body">
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" required minlength="8" placeholder="Mínimo 8 caracteres" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary-custom">Iniciar Sesión</button>
            </form>
        </div>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            if (!Validaciones.esEmailValido(email)) {
                Toast.mostrar('Email no válido', 'danger');
                return;
            }
            if (!Validaciones.esContrasenaValida(contrasena)) {
                Toast.mostrar('La contraseña debe tener al menos 8 caracteres', 'danger');
                return;
            }
            mostrarLoader();
            try {
                await API.post(API.getBaseUrl() + '/api/login', { email, contrasena });
                Toast.mostrar('Inicio de sesión exitoso', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } catch (error) {
                Toast.mostrar(error.message, 'danger');
            } finally {
                ocultarLoader();
            }
        });
    </script>
</body>
</html>
